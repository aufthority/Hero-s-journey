<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Yusha's Sonic Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#0a0a1a;min-height:100%;-webkit-text-size-adjust:100%;}
    @keyframes shimmer{0%,100%{opacity:0}50%{opacity:1}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes twinkle{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 20px #10b98166}50%{box-shadow:0 0 40px #10b981cc}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @keyframes shadowPulse{0%,100%{box-shadow:0 0 20px #7c3aed66}50%{box-shadow:0 0 40px #7c3aedcc}}
    @keyframes chaosGlow{0%,100%{filter:drop-shadow(0 0 4px #7c3aed)}50%{filter:drop-shadow(0 0 12px #a855f7)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#0a0a1a}
    ::-webkit-scrollbar-thumb{background:#312e81;border-radius:3px}
    input[type=password]::-ms-reveal{display:none}
    /* Global overflow guard */
    .safe-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
    .safe-wrap{overflow-wrap:break-word;word-break:break-word;min-width:0;}
  </style>
</head>

                  h("div",{style:{fontFamily:BF,fontSize:12,color:"#fca5a5",marginBottom:8,fontWeight:700,textAlign:"center"}},"Shadow collects 1 Chaos Emerald for:"),
                  h("div",{style:{fontFamily:BF,fontSize:13,color:"#e9d5ff",marginBottom:10,textAlign:"center",fontWeight:800}},'"'+strikeReason+'"'),
                  h("div",{style:{display:"flex",gap:8}},
                    h("button",{onClick:issueStrike,style:{flex:1,padding:"10px",fontFamily:PF,fontSize:7,background:"linear-gradient(135deg,#dc2626,#b91c1c)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",boxShadow:"0 4px 0 #7f1d1d"}},"CONFIRM"),
                    h("button",{onClick:()=>setStrikeConfirm(false),style:{flex:1,padding:"10px",fontFamily:PF,fontSize:7,background:"#1e1b4b",border:"1px solid #4338ca",borderRadius:8,color:"#a5b4fc",cursor:"pointer"}},"CANCEL")
                  )
                )
            )
          )
        ),

        /* PIN TAB */
        tab==="pin"&&h("div",{style:{background:"#0f0f23",borderRadius:12,padding:16,border:"1px dashed #6366f1"}},
          h("div",{style:{fontFamily:PF,fontSize:7,color:"#6366f1",marginBottom:16,textAlign:"center"}},"CHANGE PARENT PIN"),
          [["Current PIN",oldPin,setOldPin],["New PIN",newPin1,setNewPin1],["Confirm PIN",newPin2,setNewPin2]].map(([label,val,setter],i)=>
            h("div",{key:i,style:{marginBottom:12}},
              h("div",{style:{fontFamily:PF,fontSize:7,color:"#818cf8",marginBottom:5}},label),
              h("input",{type:"password",value:val,onChange:e=>setter(e.target.value.replace(/\D/g,"").slice(0,4)),maxLength:4,placeholder:"••••",style:{width:"100%",padding:"11px",textAlign:"center",fontFamily:PF,fontSize:16,letterSpacing:10,background:"#1e1b4b",border:"1px solid #4338ca",borderRadius:8,color:"#f59e0b",boxSizing:"border-box"}})
            )
          ),
          pinMsg&&h("div",{style:{padding:"9px 12px",borderRadius:8,marginBottom:12,textAlign:"center",background:pinMsg.t==="ok"?"#064e3b":"#450a0a",border:`1px solid ${pinMsg.t==="ok"?"#10b981":"#f87171"}`,fontFamily:BF,fontSize:12,color:pinMsg.t==="ok"?"#a7f3d0":"#fca5a5",fontWeight:700}},pinMsg.m),
          h("button",{onClick:handlePinChange,style:{width:"100%",padding:"11px",fontFamily:PF,fontSize:8,background:"linear-gradient(135deg,#6366f1,#4338ca)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",boxShadow:"0 4px 0 #3730a3"}},"SAVE NEW PIN")
        )
      )
    );
  }

  /* ── PIN Prompt ── */
  function PinPrompt({onSuccess,onCancel,parentPin}){
    const [pin,setPin]=useState("");
    const [error,setError]=useState(false);
    const submit=()=>{
      if(pin===parentPin){onSuccess();}
      else{setError(true);setPin("");setTimeout(()=>setError(false),1500);}
    };
    return h("div",{style:{...modalWrap,zIndex:800}},
      h("div",{style:{background:"#1a1a2e",border:`2px solid ${error?"#f87171":"#6366f1"}`,borderRadius:16,padding:"28px 24px",textAlign:"center",boxShadow:"0 20px 60px #0009",animation:error?"shake 0.4s ease":"none",width:"100%",maxWidth:300}},
        h("div",{style:{fontFamily:PF,fontSize:8,color:"#a5b4fc",marginBottom:6}},"DEV CONSOLE 🔒"),
        error&&h("div",{style:{fontFamily:BF,fontSize:12,color:"#f87171",marginBottom:8,fontWeight:700}},"Wrong PIN. Try again."),
        h("input",{type:"password",value:pin,onChange:e=>setPin(e.target.value.replace(/\D/g,"").slice(0,4)),onKeyDown:e=>e.key==="Enter"&&submit(),maxLength:4,placeholder:"••••",autoFocus:true,style:{fontFamily:PF,fontSize:18,textAlign:"center",width:110,padding:"10px",background:"#0f0f23",border:`2px solid ${error?"#f87171":"#4338ca"}`,borderRadius:8,color:"#f59e0b",letterSpacing:8,display:"block",margin:"0 auto 16px"}}),
        h("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          h("button",{onClick:submit,style:{fontFamily:PF,fontSize:8,padding:"10px 18px",background:"#6366f1",border:"none",borderRadius:8,color:"#fff",cursor:"pointer"}},"ENTER"),
          h("button",{onClick:onCancel,style:{fontFamily:PF,fontSize:8,padding:"10px 18px",background:"#1e1b4b",border:"1px solid #4338ca",borderRadius:8,color:"#a5b4fc",cursor:"pointer"}},"CANCEL")
        )
      )
    );
  }

  /* ══════════════════════════════════
     MAIN APP
  ══════════════════════════════════ */
  function App(){
    const [missions,setMissions]   = useState(DEFAULT_MISSIONS);
    const [items,setItems]         = useState(DEFAULT_ITEMS);
    const [completed,setCompleted] = useState(new Set());
    const [totalRings,setTotalRings] = useState(0);
    const [shopRings,setShopRings]   = useState(0);
    const [emeralds,setEmeralds]     = useState(0);
    const [chaosMissionsDone,setChaosMissionsDone] = useState(new Set());
    const [rankUpModal,setRankUpModal]   = useState(null);
    const [stageClear,setStageClear]     = useState(false);
    const [chaosModal,setChaosModal]     = useState(false);
    const [shadowDefeated,setShadowDefeated] = useState(false);
    const [adminOpen,setAdminOpen]       = useState(false);
    const [shopOpen,setShopOpen]         = useState(false);
    const [pinTarget,setPinTarget]       = useState(null);
    const [parentPin,setParentPin]       = useState("1234");
    const [streak,setStreak]             = useState(0);
    const [lastDate,setLastDate]         = useState(null);
    const [shadowLog,setShadowLog]       = useState([]);
    const prevRank   = useRef(1);
    const chestShown = useRef(false);

    const shopLocked = emeralds >= MAX_EMERALDS;
    const rank       = Math.floor(totalRings/RINGS_PER_RANK)+1;
    const rankRings  = totalRings%RINGS_PER_RANK;
    const rankTitle  = LEVEL_TITLES[Math.min(rank-1,LEVEL_TITLES.length-1)];
    const allDone    = missions.length>0 && completed.size===missions.length;
    const allChaosDone = shopLocked && chaosMissionsDone.size >= CHAOS_MISSIONS.length;

    const toggleMission=id=>{
      const m=missions.find(x=>x.id===id);
      if(!m)return;
      const done=completed.has(id);
      if(!done){
        setCompleted(c=>new Set([...c,id]));
        setTotalRings(r=>r+m.rings);
        setShopRings(r=>r+m.rings);
      } else {
        setCompleted(c=>{const n=new Set(c);n.delete(id);return n;});
        setTotalRings(r=>Math.max(0,r-m.rings));
        setShopRings(r=>Math.max(0,r-m.rings));
      }
    };

    const toggleChaosMission=id=>{
      if(chaosMissionsDone.has(id))return;
      const m=CHAOS_MISSIONS.find(x=>x.id===id);
      if(!m)return;
      setChaosMissionsDone(c=>new Set([...c,id]));
      setTotalRings(r=>r+m.rings);
      setShopRings(r=>r+m.rings);
    };

    // Rank up check
    useEffect(()=>{
      if(rank>prevRank.current){
        setRankUpModal({rank,title:rankTitle});
        prevRank.current=rank;
      }
    },[rank]);

    // Stage clear
    useEffect(()=>{
      if(allDone&&!chestShown.current){
        chestShown.current=true;
        const today=new Date().toDateString();
        if(lastDate){
          const diff=(new Date(today)-new Date(lastDate))/864e5;
          if(diff===1)setStreak(s=>s+1);
          else if(diff>1)setStreak(1);
        } else setStreak(1);
        setLastDate(today);
        // Good day removes one emerald
        if(emeralds>0) setEmeralds(e=>e-1);
        setTimeout(()=>setStageClear(true),600);
      }
      if(!allDone)chestShown.current=false;
    },[allDone]);

    // Chaos unleashed check
    useEffect(()=>{
      if(emeralds>=MAX_EMERALDS) setTimeout(()=>setChaosModal(true),400);
    },[emeralds]);

    // Shadow defeated check
    useEffect(()=>{
      if(allChaosDone){
        const bonus=100;
        setTotalRings(r=>r+bonus);
        setShopRings(r=>r+bonus);
        setEmeralds(0);
        setChaosMissionsDone(new Set());
        setTimeout(()=>setShadowDefeated(true),400);
      }
    },[allChaosDone]);

    const shadowStrike=(reason)=>{
      if(emeralds>=MAX_EMERALDS)return;
      setEmeralds(e=>e+1);
      setShadowLog(l=>[{reason,time:new Date().toLocaleTimeString()},...l].slice(0,10));
    };

    const resetStage=()=>{setCompleted(new Set());chestShown.current=false;};

    // Stars
    const stars=useRef(Array.from({length:36},()=>({
      left:Math.random()*100,top:Math.random()*100,
      size:Math.random()>0.7?3:2,
      dur:2+Math.random()*3,delay:Math.random()*3
    })));

    const sonicBlue="#00b4fc";

    return h("div",null,
      /* Stars */
      h("div",{style:{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none"}},
        stars.current.map((s,i)=>h("div",{key:i,style:{position:"absolute",left:`${s.left}%`,top:`${s.top}%`,width:s.size,height:s.size,background:"#fff",borderRadius:"50%",animation:`twinkle ${s.dur}s ${s.delay}s infinite`}}))
      ),

      /* Modals */
      rankUpModal&&h(RankUpModal,{rank:rankUpModal.rank,title:rankUpModal.title,onClose:()=>setRankUpModal(null)}),
      stageClear&&h(StageClearModal,{onClose:()=>setStageClear(false)}),
      chaosModal&&h(ChaosUnleashedModal,{onClose:()=>setChaosModal(false)}),
      shadowDefeated&&h(ShadowDefeatedModal,{bonusRings:100,onClose:()=>setShadowDefeated(false)}),
      adminOpen&&h(DevConsole,{missions,setMissions,currentPin:parentPin,onPinChange:setParentPin,emeralds,onShadowStrike:shadowStrike,onClose:()=>setAdminOpen(false)}),
      shopOpen&&h(ItemBoxShop,{shopRings,onSpend:amt=>setShopRings(r=>Math.max(0,r-amt)),items,setItems,onClose:()=>setShopOpen(false),shopLocked}),
      pinTarget&&h(PinPrompt,{parentPin,onCancel:()=>setPinTarget(null),onSuccess:()=>{
        if(pinTarget==="admin")setAdminOpen(true);
        if(pinTarget==="shop")setShopOpen(true);
        setPinTarget(null);
      }}),

      /* ── MAIN SCREEN ── */
      h("div",{style:{
        minHeight:"100vh",
        background:"linear-gradient(160deg,#0a0a1a 0%,#0f0f2e 50%,#0a0a1a 100%)",
        padding:"20px 14px 40px",maxWidth:480,margin:"0 auto"
      }},

        /* Title */
        h("div",{style:{textAlign:"center",marginBottom:16,animation:"slideDown 0.6s ease"}},
          h("div",{style:{fontFamily:PF,fontSize:7,color:sonicBlue,letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"⚡ YUSHA'S SONIC QUEST ⚡")
        ),

        /* Avatar card */
        h("div",{style:{display:"flex",alignItems:"center",gap:14,background:"linear-gradient(135deg,#1e1b4b,#312e81)",border:`2px solid ${sonicBlue}`,borderRadius:18,padding:"16px 14px",marginBottom:14,overflow:"hidden",boxShadow:`0 8px 32px ${sonicBlue}22`}},
          h(Avatar,{rank}),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontFamily:PF,fontSize:7,color:"#818cf8",marginBottom:3,whiteSpace:"nowrap"}},"SONIC RANK "+rank),
            h("div",{style:{fontFamily:PF,fontSize:10,color:"#fde68a",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textShadow:`0 0 20px ${sonicBlue}66`}},"YUSHA"),
            h("div",{className:"safe-text",style:{fontFamily:BF,fontSize:12,color:"#a5b4fc",marginBottom:8}},rankTitle),
            h(RingBar,{value:rankRings,max:RINGS_PER_RANK,color:sonicBlue}),
            h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4}},
              h("span",{style:{fontFamily:PF,fontSize:6,color:"#818cf8",whiteSpace:"nowrap"}},rankRings+"/"+RINGS_PER_RANK+" 💍"),
              h("span",{style:{fontFamily:PF,fontSize:6,color:"#818cf8",whiteSpace:"nowrap"}},"R"+(rank+1)+" →")
            )
          )
        ),

        /* Stats row */
        h("div",{style:{display:"flex",gap:8,marginBottom:14}},
          [
            {emoji:streak>=7?"🔥":streak>=3?"⚡":"💨",val:streak,label:"STREAK",gold:streak>=3},
            {emoji:"💍",val:totalRings,label:"RINGS",gold:false},
            {emoji:"🎁",val:shopRings,label:"SHOP 💍",gold:true},
          ].map((s,i)=>h("div",{key:i,style:{
            flex:1,background:"linear-gradient(135deg,#1e1b4b,#312e81)",
            border:`2px solid ${s.gold?"#f59e0b":"#4338ca"}`,
            borderRadius:12,padding:"10px 6px",textAlign:"center",
            overflow:"hidden",
            boxShadow:s.gold?"0 0 14px #f59e0b44":"none"
          }},
            h("div",{style:{fontSize:20,marginBottom:3}},s.emoji),
            h("div",{style:{fontFamily:PF,fontSize:12,color:s.gold?"#f59e0b":"#fde68a",overflow:"hidden",textOverflow:"ellipsis"}},s.val),
            h("div",{style:{fontFamily:PF,fontSize:6,color:"#818cf8",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},s.label)
          ))
        ),

        /* Shadow Chaos Emerald bar — always visible */
        h("div",{style:{
          background:emeralds>0?"linear-gradient(135deg,#2e1065,#4c1d95)":"linear-gradient(135deg,#1e1b4b,#312e81)",
          border:`2px solid ${emeralds>=MAX_EMERALDS?"#f87171":emeralds>0?"#7c3aed":"#4338ca"}`,
          borderRadius:14,padding:"12px 14px",marginBottom:14,
          animation:emeralds>=MAX_EMERALDS?"shadowPulse 2s ease-in-out infinite":"none",
          overflow:"hidden"
        }},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",{style:{fontFamily:PF,fontSize:7,color:emeralds>=MAX_EMERALDS?"#f87171":emeralds>0?"#a855f7":"#818cf8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},"🔮 SHADOW'S EMERALDS"),
            h("div",{style:{fontFamily:PF,fontSize:7,color:emeralds>=MAX_EMERALDS?"#f87171":"#818cf8",flexShrink:0,marginLeft:8}},emeralds+"/"+MAX_EMERALDS)
          ),
          h(EmeraldRow,{count:emeralds}),
          emeralds>0&&emeralds<MAX_EMERALDS&&h("div",{style:{fontFamily:BF,fontSize:11,color:"#c4b5fd",textAlign:"center",marginTop:6}},
            "Complete a full day to reclaim 1 emerald! 💪"
          ),
          emeralds>=MAX_EMERALDS&&h("div",{style:{fontFamily:PF,fontSize:7,color:"#f87171",textAlign:"center",marginTop:6}},"CHAOS UNLEASHED! COMPLETE MISSIONS!")
        ),

        /* Chaos Control Missions (shown when shop locked) */
        shopLocked&&h("div",{style:{background:"linear-gradient(135deg,#2e1065,#4c1d95)",border:"2px solid #a855f7",borderRadius:14,padding:"14px",marginBottom:14,overflow:"hidden"}},
          h("div",{style:{fontFamily:PF,fontSize:7,color:"#a855f7",marginBottom:10,textAlign:"center"}},"⚡ CHAOS CONTROL MISSIONS"),
          h("div",{style:{fontFamily:BF,fontSize:11,color:"#c4b5fd",marginBottom:10,textAlign:"center"}},chaosMissionsDone.size+"/"+CHAOS_MISSIONS.length+" complete — defeat Shadow to unlock shop!"),
          h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            CHAOS_MISSIONS.map(m=>{
              const done=chaosMissionsDone.has(m.id);
              return h("div",{key:m.id,onClick:()=>toggleChaosMission(m.id),style:{
                display:"flex",alignItems:"center",gap:10,
                background:done?"#064e3b22":"#1e1b4b",
                border:done?"2px solid #10b981":"2px solid #6d28d9",
                borderRadius:10,padding:"10px 12px",
                cursor:done?"default":"pointer",overflow:"hidden"
              }},
                h("div",{style:{fontSize:24,flexShrink:0}},m.icon),
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{className:"safe-text",style:{fontFamily:BF,fontWeight:800,fontSize:13,color:done?"#a7f3d0":"#e0e7ff",textDecoration:done?"line-through":"none"}},m.label),
                  h("div",{style:{fontFamily:PF,fontSize:7,color:"#f59e0b",marginTop:2,whiteSpace:"nowrap"}},"+"+m.rings+" 💍")
                ),
                h("div",{style:{width:28,height:28,borderRadius:6,flexShrink:0,background:done?"#10b981":"#1e1b4b",border:done?"2px solid #34d399":"2px solid #6d28d9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},done?"✓":"")
              );
            })
          )
        ),

        /* Mission progress */
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
          h("div",{style:{fontFamily:PF,fontSize:7,color:"#818cf8",whiteSpace:"nowrap"}},"DAILY MISSIONS"),
          h("div",{style:{fontFamily:PF,fontSize:7,color:allDone?"#10b981":"#f59e0b",flexShrink:0,marginLeft:8}},completed.size+"/"+missions.length+" ✓")
        ),
        h("div",{style:{marginBottom:12}},
          h(RingBar,{value:completed.size,max:Math.max(missions.length,1),color:allDone?"#10b981":sonicBlue})
        ),

        /* Stage Clear banner */
        allDone&&h("div",{onClick:()=>setStageClear(true),style:{
          background:"linear-gradient(135deg,#064e3b,#065f46)",
          border:"2px solid #10b981",borderRadius:12,
          padding:"12px 16px",marginBottom:12,cursor:"pointer",
          display:"flex",alignItems:"center",gap:12,
          animation:"pulse 2s ease-in-out infinite",overflow:"hidden"
        }},
          h("span",{style:{fontSize:26,flexShrink:0}},"🎁"),
          h("div",{style:{minWidth:0}},
            h("div",{style:{fontFamily:PF,fontSize:7,color:"#10b981",whiteSpace:"nowrap"}},"✨ STAGE CLEAR!"),
            h("div",{className:"safe-text",style:{fontFamily:BF,fontSize:12,color:"#6ee7b7",marginTop:2}}),"Bonus Stage unlocked, Yusha!"
          )
        ),

        /* Mission list */
        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          missions.map(m=>h(MissionCard,{key:m.id,mission:m,done:completed.has(m.id),onToggle:toggleMission}))
        ),

        /* Action buttons */
        h("div",{style:{display:"flex",gap:8,marginTop:22}},
          h("button",{onClick:()=>setShopOpen(true),style:{
            flex:2,fontFamily:PF,fontSize:7,padding:"14px 8px",
            background:shopLocked?"linear-gradient(135deg,#4c1d95,#2e1065)":"linear-gradient(135deg,#f59e0b,#d97706)",
            border:shopLocked?"2px solid #7c3aed":"none",
            borderRadius:12,color:shopLocked?"#c4b5fd":"#1a1a2e",cursor:"pointer",
            boxShadow:shopLocked?"none":"0 4px 0 #92400e",
            overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"
          }},shopLocked?"🔮 SHOP LOCKED":"🎁 ITEM BOX SHOP"),
          h("button",{onClick:resetStage,style:{flex:1,fontFamily:PF,fontSize:7,padding:"14px 6px",background:"#1e1b4b",border:"1px solid #4338ca",borderRadius:12,color:"#818cf8",cursor:"pointer",whiteSpace:"nowrap"}},"🔄 NEW STAGE"),
          h("button",{onClick:()=>setPinTarget("admin"),style:{flex:1,fontFamily:PF,fontSize:7,padding:"14px 6px",background:"#1e1b4b",border:"1px solid #4338ca",borderRadius:12,color:"#818cf8",cursor:"pointer",whiteSpace:"nowrap"}},"⚙️ DEV")
        )
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
</body>
</html>
